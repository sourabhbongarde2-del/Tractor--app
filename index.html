    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDjfVQEw5XT3lK7gb6oM5JQ84UNEeVNz1I",
            authDomain: "tractor--app.firebaseapp.com",
            projectId: "tractor--app",
            storageBucket: "tractor--app.firebasestorage.app",
            messagingSenderId: "864431539732",
            appId: "1:864431539732:web:39bcde2318404733ee8901",
            measurementId: "G-6RJ68S4LGJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // UI Elements
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const userNameDisp = document.getElementById('user-name');
        const bookingForm = document.getElementById('booking-form');
        const recordsList = document.getElementById('records-list');
        const totalEarningsDisp = document.getElementById('total-earnings');

        let currentUser = null;

        // --- AUTH LOGIC ---
        window.login = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login Error", error);
                alert("लॉगिन अयशस्वी झाले!");
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                userNameDisp.innerText = user.displayName;
                loadData();
            } else {
                currentUser = null;
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        // --- DATA LOGIC ---
        bookingForm.onsubmit = async (e) => {
            e.preventDefault();
            const customer = document.getElementById('customer').value;
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('work-type').value;

            if (!customer || !amount) return;

            try {
                await addDoc(collection(db, `users/${currentUser.uid}/bookings`), {
                    customer,
                    amount: Number(amount),
                    type,
                    date: new Date().toISOString()
                });
                bookingForm.reset();
            } catch (err) {
                console.error("Data Save Error", err);
                // Offline Logic: Saving to LocalStorage if Firebase fails
                saveOffline(customer, amount, type);
            }
        };

        function loadData() {
            const q = query(collection(db, `users/${currentUser.uid}/bookings`), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                let html = '';
                let total = 0;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    total += data.amount;
                    html += `
                        <div class="bg-white p-4 rounded-lg shadow mb-3 flex justify-between items-center border-l-4 border-orange-500">
                            <div>
                                <p class="font-bold text-gray-800">${data.customer}</p>
                                <p class="text-xs text-gray-500">${data.type} | ${new Date(data.date).toLocaleDateString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-green-600">₹${data.amount}</p>
                                <button onclick="deleteRecord('${doc.id}')" class="text-red-400 text-xs mt-1">डिलीट</button>
                            </div>
                        </div>
                    `;
                });
                recordsList.innerHTML = html || '<p class="text-center text-gray-400 py-10">अद्याप कोणतीही नोंद नाही</p>';
                totalEarningsDisp.innerText = `₹${total}`;
            });
        }

        window.deleteRecord = async (id) => {
            if(confirm('ही नोंद हटवायची आहे का?')) {
                await deleteDoc(doc(db, `users/${currentUser.uid}/bookings`, id));
            }
        };

        function saveOffline(customer, amount, type) {
            alert("इंटरनेट नाही! नोंद फोनमध्ये सेव्ह झाली आहे (Offline Mode).");
            // Simple LocalStorage Fallback
            const offlineData = JSON.parse(localStorage.getItem('offline_bookings') || '[]');
            offlineData.push({ customer, amount, type, date: new Date().toISOString() });
            localStorage.setItem('offline_bookings', JSON.stringify(offlineData));
        }

    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }

</head>
<body class="max-w-md mx-auto min-h-screen relative shadow-2xl">

    <div id="login-screen" class="flex flex-col items-center justify-center h-screen bg-white p-8">
        <div class="w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center mb-6">
            <span class="text-5xl">🚜</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">ट्रॅक्टर बिझनेस प्रो</h1>

        <button onclick="login()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-3 px-4 rounded-xl shadow-sm hover:bg-gray-50 transition-all font-medium text-gray-700">

            Google द्वारे लॉगिन करा
        </button>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="hidden pb-24">

        <div class="tractor-gradient text-white p-6 rounded-b-[2rem] shadow-lg">
            <div class="flex justify-between items-start mb-6">
                <div>

                </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-lg text-xs">बाहेर पडा</button>

            <div class="bg-white/20 backdrop-blur-md p-4 rounded-2xl">
                <p class="text-sm opacity-90">एकूण कमाई</p>
                <h3 id="total-earnings" class="text-3xl font-bold">₹0</h3>
            </div>
        </div>

        <!-- Booking Form -->
        <div class="p-4 -mt-8">
            <form id="booking-form" class="bg-white p-5 rounded-2xl shadow-xl space-y-4">

                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="customer" placeholder="शेतकऱ्याचे नाव" class="col-span-2 w-full p-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" required>
                    <input type="number" id="amount" placeholder="रक्कम (₹)" class="w-full p-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" required>

                        <option value="रोटाव्हेटर">रोटाव्हेटर</option>
                        <option value="ट्रॉली">ट्रॉली</option>
                    </select>
                </div>
                <button type="submit" class="w-full tractor-gradient text-white py-3 rounded-xl font-bold shadow-orange-200 shadow-lg active:scale-95 transition-transform">
                    सेव्ह करा
                </button>
            </form>
        </div>

        <!-- Records List -->
        <div class="p-4">
            <h4 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                <span>📅</span> अलीकडील नोंदी
            </h4>
            <div id="records-list" class="space-y-1">
                <!-- Data comes here -->
            </div>
        </div>

        <!-- Bottom Navigation (Mock) -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-4 flex justify-around text-gray-400">

                <span class="text-[10px]">होम</span>

                <span class="text-xl">📊</span>
                <span class="text-[10px]">रिपोर्ट</span>
            </div>

                <span class="text-xl">⚙️</span>
                <span class="text-[10px]">सेटिंग्स</span>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
