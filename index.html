
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TractorWala Pro - Premium Agriculture Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Hind:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #15803d; --light-green: #f0fdf4; --accent-green: #22c55e; }
        body { font-family: 'Plus Jakarta Sans', 'Hind', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .green-gradient { background: linear-gradient(135deg, #15803d 0%, #166534 100%); }
        #side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 900; }
        
        /* Fixed Alignment Cards */
        .card-pro { 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); 
            border: 1px solid #f1f5f9;
            width: 100%;
        }
        
        .btn-primary { 
            background: var(--primary-green); 
            color: white; 
            transition: all 0.2s; 
            box-shadow: 0 10px 20px -5px rgba(21, 128, 61, 0.3); 
        }
        
        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            padding: 14px 20px; 
            border-radius: 18px; 
            color: #64748b; 
            transition: all 0.2s; 
            font-weight: 600; 
            margin-bottom: 4px;
            width: 100%;
            text-align: left;
        }
        
        .nav-item.active { background: var(--light-green); color: var(--primary-green); }
        .tab-content { animation: slideIn 0.3s ease-out; width: 100%; }
        
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Input Styling for better alignment */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
        }
        
        input, select {
            width: 100%;
            padding: 1rem 1.25rem;
            background-color: #f8fafc;
            border: 1.5px solid #f1f5f9;
            border-radius: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input:focus { border-color: var(--primary-green); }

        .recording { 
            background: #fee2e2 !important; 
            border: 2px solid #ef4444 !important; 
            animation: pulse 1.5s infinite; 
        }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-white flex flex-col">

    <!-- SIDE NAVIGATION PANEL -->
    <div id="side-panel" class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl translate-x-[-100%] flex flex-col">
        <div class="p-8 border-b border-slate-50">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center text-white font-extrabold text-2xl shadow-lg">T</div>
                <div>
                    <h3 id="side-biz-name" class="font-extrabold text-slate-900 leading-tight">TractorWala</h3>
                    <p class="text-[10px] text-green-600 font-bold uppercase tracking-widest">v2.0 Pro Edition</p>
                </div>
            </div>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto space-y-1">
            <button onclick="switchTab('dashboard')" class="nav-item active" id="nav-dashboard">🏠 डॅशबोर्ड</button>
            <button onclick="switchTab('jobs')" class="nav-item" id="nav-jobs">🚜 कामाची नोंद</button>
            <button onclick="switchTab('pending')" class="nav-item" id="nav-pending">⏳ बाकी वसुली</button>
            <button onclick="switchTab('settings')" class="nav-item" id="nav-settings">⚙️ सेटिंग्स</button>
            <div class="mt-8 pt-4 border-t border-slate-50">
                <button onclick="logout()" class="nav-item text-red-500">🚪 लॉग-आउट</button>
            </div>
        </div>

        <div class="p-6 border-t border-slate-50">
            <div class="bg-slate-50 p-4 rounded-2xl text-center">
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Developer</p>
                <p class="text-[13px] text-slate-900 font-black">Sourabh Bongarde</p>
            </div>
        </div>
    </div>
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-8 text-center bg-white z-[2000] relative">
        <div class="mb-12">
            <div class="w-56 h-56 bg-green-50 rounded-full flex items-center justify-center mb-8 mx-auto shadow-inner">
                <img src="https://wallpapers.com/images/hd/smiling-cartoon-farmerwith-tractor-5lyi3c0ezwugz4qm.jpg" class="w-40 h-40 object-contain drop-shadow-2xl">
            </div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter">Tractor<span class="text-green-600">Wala</span></h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[6px] mt-2">Digital Agri Expert</p>
        </div>
        <button onclick="login()" class="flex items-center gap-4 bg-white border border-slate-200 px-8 py-4 rounded-2xl shadow-sm active:scale-95 transition-all">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" class="w-6 h-6">
            <span class="font-bold text-slate-700">Google ने सुरू करा</span>
        </button>
        <div class="absolute bottom-8 w-full text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[3px]">By Sourabh Bongarde</p>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-screen" class="hidden min-h-screen flex flex-col">
        <header class="p-4 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
            <button onclick="toggleMenu()" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl">☰</button>
            <span id="header-biz-name" class="font-black text-slate-800 text-lg tracking-tight">TractorWala</span>
            <div id="user-photo-small" class="w-10 h-10 rounded-xl bg-green-600 text-white flex items-center justify-center font-bold shadow-md shadow-green-100">U</div>
        </header>

        <main class="flex-1 overflow-y-auto pb-32">
            <!-- DASHBOARD -->
            <section id="section-dashboard" class="p-5 space-y-6 tab-content">
                <div class="green-gradient p-8 rounded-[32px] text-white shadow-xl shadow-green-100 relative overflow-hidden">
                    <p class="text-green-100/70 text-[11px] font-bold uppercase tracking-[2px] mb-1">एकूण उत्पन्न (Total Profit)</p>
                    <h2 id="net-profit" class="text-5xl font-black tracking-tighter">₹0</h2>
                    <div class="absolute -bottom-6 -right-6 w-24 h-24 bg-white/10 rounded-full blur-2xl"></div>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-center px-2">
                        <h4 class="font-extrabold text-slate-800 text-xs uppercase tracking-widest">नुकतीच झालेली कामे</h4>
                        <button onclick="switchTab('jobs')" class="text-green-600 text-[10px] font-bold uppercase">सर्व पहा</button>
                    </div>
                    <div id="recent-jobs" class="space-y-3"></div>
                </div>
            </section>

            <!-- JOBS SECTION -->
            <section id="section-jobs" class="hidden p-5 space-y-6 tab-content">
                <div class="card-pro p-6 border-2 border-green-50">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="font-extrabold text-green-800 text-xs uppercase tracking-wider">नवीन कामाची नोंद</h4>
                        <button id="voice-btn" class="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center text-lg">🎤</button>
                    </div>
                    <form id="job-form" class="space-y-4">
                        <div class="input-group">
                            <input type="text" id="j-cust" placeholder="शेतकऱ्याचे नाव" required>
                        </div>
                        <div class="input-group">
                            <input type="tel" id="j-phone" placeholder="मोबाईल नंबर (Optional)">
                        </div>
                        <div class="flex gap-3">
                            <input type="number" id="j-val" placeholder="प्रमाण (उदा. 5)" required>
                            <select id="j-unit" class="font-bold bg-white">
                                <option>Acre</option>
                                <option>Gunta</option>
                                <option>Hours</option>
                                <option>Trip</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <input type="number" id="j-amt" placeholder="एकूण रक्कम ₹" class="font-black text-lg" required>
                        </div>
                        <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer">
                            <input type="checkbox" id="j-paid" checked class="w-5 h-5 accent-green-600">
                            <span class="text-xs font-bold text-slate-600 uppercase">पैसे मिळाले (Paid)</span>
                        </label>
                        <button type="submit" class="w-full btn-primary py-5 rounded-2xl font-black text-sm uppercase tracking-widest mt-2">काम सेव्ह करा</button>
                    </form>
                </div>
                
                <div class="space-y-4">
                    <h4 class="font-extrabold text-slate-800 text-xs uppercase tracking-widest px-2">सर्व कामांची यादी</h4>
                    <div id="list-jobs" class="space-y-3"></div>
                </div>
            </section>

            <!-- PENDING SECTION -->
            <section id="section-pending" class="hidden p-5 space-y-4 tab-content">
                <div class="flex items-center gap-2 mb-4 px-2">
                    <div class="w-2 h-8 bg-red-500 rounded-full"></div>
                    <h3 class="text-xl font-black text-slate-900 tracking-tight">येणे बाकी (Unpaid)</h3>
                </div>
                <div id="list-pending" class="space-y-3"></div>
            </section>

            <!-- SETTINGS SECTION -->
            <section id="section-settings" class="hidden p-5 space-y-6 tab-content">
                <div class="card-pro p-6">
                    <h4 class="font-extrabold text-slate-800 text-xs uppercase mb-6 tracking-wider">तुमची माहिती</h4>
                    <form id="settings-form" class="space-y-4">
                        <div class="input-group">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">व्यवसायाचे नाव</label>
                            <input type="text" id="set-biz" placeholder="उदा. महालक्ष्मी ट्रॅक्टर्स">
                        </div>
                        <div class="input-group">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">UPI ID (पेमेंट साठी)</label>
                            <input type="text" id="set-upi" placeholder="उदा. 9876543210@ybl">
                        </div>
                        <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest mt-4">सेव्ह करा</button>
                    </form>
                </div>
            </section>
        </main>

        <!-- FOOTER NAV -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-xl border-t border-slate-100 px-6 py-4 grid grid-cols-4 gap-2 z-40">
            <button onclick="switchTab('dashboard')" class="flex flex-col items-center gap-1">
                <div id="bt-dashboard" class="w-12 h-12 flex items-center justify-center bg-green-600 text-white rounded-2xl shadow-lg transition-all">🏠</div>
            </button>
            <button onclick="switchTab('jobs')" class="flex flex-col items-center gap-1">
                <div id="bt-jobs" class="w-12 h-12 flex items-center justify-center bg-slate-50 text-slate-400 rounded-2xl transition-all">🚜</div>
            </button>
            <button onclick="switchTab('pending')" class="flex flex-col items-center gap-1">
                <div id="bt-pending" class="w-12 h-12 flex items-center justify-center bg-slate-50 text-slate-400 rounded-2xl transition-all">⏳</div>
            </button>
            <button onclick="toggleMenu()" class="flex flex-col items-center gap-1">
                <div class="w-12 h-12 flex items-center justify-center bg-slate-50 text-slate-400 rounded-2xl">☰</div>
            </button>
        </nav>
    </div>

    <!-- INVOICE MODAL -->
    <div id="bill-modal" class="fixed inset-0 z-[3000] hidden flex items-center justify-center p-6 bg-black/70 backdrop-blur-md">
        <div class="bg-white w-full rounded-[32px] p-8 text-center relative shadow-2xl overflow-hidden">
            <button onclick="closeBill()" class="absolute top-6 right-6 text-slate-400 w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full font-bold">✕</button>
            
            <div id="qr-code" class="mb-6 flex justify-center p-4 bg-slate-50 rounded-3xl mx-auto w-fit"></div>
            
            <h3 id="bill-biz" class="font-black text-2xl text-slate-900 mb-1">TractorWala</h3>
            <div class="h-1 w-12 bg-green-600 mx-auto mb-6 rounded-full"></div>
            
            <div class="bg-slate-50 rounded-2xl p-4 mb-8 text-left space-y-2">
                <div class="flex justify-between"><span class="text-slate-400 text-xs font-bold uppercase">शेतकरी</span><span id="b-name" class="font-bold"></span></div>
                <div class="flex justify-between"><span class="text-slate-400 text-xs font-bold uppercase">काम</span><span id="b-work" class="font-bold"></span></div>
                <div class="flex justify-between pt-2 border-t border-slate-200"><span class="text-slate-400 text-xs font-bold uppercase">एकूण</span><span id="b-amt" class="font-black text-green-700 text-lg"></span></div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="pdf-btn" class="bg-slate-100 py-4 rounded-2xl font-bold text-xs uppercase text-slate-700">PDF पावती</button>
                <button id="wa-btn" class="bg-green-600 text-white py-4 rounded-2xl font-bold text-xs uppercase shadow-lg shadow-green-100">WhatsApp</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, setDoc, getDoc, query, onSnapshot, orderBy, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjfVQEw5XT3lK7gb6oM5JQ84UNEeVNz1I",
            authDomain: "tractor--app.firebaseapp.com",
            projectId: "tractor--app",
            storageBucket: "tractor--app.firebasestorage.app",
            messagingSenderId: "864431539732",
            appId: "1:864431539732:web:39bcde2318404733ee8901",
            measurementId: "G-6RJ68S4LGJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let user = null;
        let bizSettings = { bizName: 'TractorWala', upi: '' };

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);
        
        window.toggleMenu = () => {
            const menu = document.getElementById('side-panel');
            const overlay = document.getElementById('overlay');
            const isOpen = menu.style.transform === 'translateX(0%)';
            menu.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0%)';
            overlay.style.display = isOpen ? 'none' : 'block';
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                if(u.photoURL) document.getElementById('user-photo-small').innerHTML = `<img src="${u.photoURL}" class="w-full h-full object-cover">`;
                
                const sDoc = await getDoc(doc(db, "users", user.uid, "profile", "settings"));
                if(sDoc.exists()) { bizSettings = sDoc.data(); updateBizUI(); }
                startSync();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function updateBizUI() {
            const bName = bizSettings.bizName || 'TractorWala';
            document.getElementById('header-biz-name').innerText = bName;
            document.getElementById('side-biz-name').innerText = bName;
            document.getElementById('set-biz').value = bName;
            document.getElementById('set-upi').value = bizSettings.upi || '';
        }

        window.switchTab = (t) => {
            ['dashboard', 'jobs', 'pending', 'settings'].forEach(s => {
                document.getElementById(`section-${s}`).classList.add('hidden');
                const nav = document.getElementById(`nav-${s}`); if(nav) nav.classList.remove('active');
                const btn = document.getElementById(`bt-${s}`); if(btn) { 
                    btn.classList.replace('bg-green-600', 'bg-slate-50'); 
                    btn.classList.replace('text-white', 'text-slate-400'); 
                    btn.classList.remove('shadow-lg'); 
                }
            });
            document.getElementById(`section-${t}`).classList.remove('hidden');
            const activeNav = document.getElementById(`nav-${t}`); if(activeNav) activeNav.classList.add('active');
            const activeBtn = document.getElementById(`bt-${t}`); if(activeBtn) { 
                activeBtn.classList.replace('bg-slate-50', 'bg-green-600'); 
                activeBtn.classList.replace('text-slate-400', 'text-white'); 
                activeBtn.classList.add('shadow-lg'); 
            }
            if(document.getElementById('side-panel').style.transform === 'translateX(0%)') toggleMenu();
        };
        function startSync() {
            onSnapshot(query(collection(db, "users", user.uid, "jobs"), orderBy("ts", "desc")), (snap) => {
                let html = ''; let p_html = ''; let r_html = ''; let total = 0; let count = 0;
                snap.forEach(d => {
                    const v = d.data(); if(v.paid) total += Number(v.amt);
                    const card = `
                    <div class="card-pro p-4 flex justify-between items-center transition-all active:scale-[0.98]">
                        <div class="flex flex-col">
                            <p class="font-black text-slate-800">${v.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${v.val} ${v.unit}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black ${v.paid ? 'text-slate-900' : 'text-red-500'} text-lg">₹${v.amt}</p>
                            <div class="flex gap-4 mt-1 justify-end">
                                <button onclick="openBill('${v.name}', ${v.amt}, '${v.paid}', '${v.val}', '${v.unit}', '${v.phone || ''}')" class="text-green-600 text-[10px] font-bold uppercase tracking-widest">पावती</button>
                                <button onclick="delJob('${d.id}')" class="text-slate-300">🗑️</button>
                            </div>
                        </div>
                    </div>`;
                    html += card; 
                    if(!v.paid) p_html += card; 
                    if(count < 5) r_html += card; 
                    count++;
                });
                document.getElementById('list-jobs').innerHTML = html || '<p class="text-center py-10 text-slate-300 font-bold uppercase tracking-widest text-xs">No Jobs Found</p>';
                document.getElementById('list-pending').innerHTML = p_html || '<div class="text-center py-20"><p class="text-green-500 font-black text-xl mb-2">सर्व पेमेंट मिळाले!</p><p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Great Job!</p></div>';
                document.getElementById('recent-jobs').innerHTML = r_html;
                document.getElementById('net-profit').innerText = `₹${total.toLocaleString('hi-IN')}`;
            });
        }

        document.getElementById('job-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = "सेव्ह होत आहे...";
            try {
                const data = {
                    name: document.getElementById('j-cust').value,
                    phone: document.getElementById('j-phone').value,
                    val: document.getElementById('j-val').value,
                    unit: document.getElementById('j-unit').value,
                    amt: Number(document.getElementById('j-amt').value),
                    paid: document.getElementById('j-paid').checked,
                    ts: serverTimestamp()
                };
                await addDoc(collection(db, "users", user.uid, "jobs"), data);
                e.target.reset();
                switchTab('dashboard');
            } catch(e) { console.error(e); }
            btn.disabled = false; btn.innerText = "काम सेव्ह करा";
        };

        document.getElementById('settings-form').onsubmit = async (e) => {
            e.preventDefault();
            bizSettings = { bizName: document.getElementById('set-biz').value, upi: document.getElementById('set-upi').value };
            await setDoc(doc(db, "users", user.uid, "profile", "settings"), bizSettings);
            updateBizUI();
            alert('Settings Saved!');
        };

        window.delJob = async (id) => { if(confirm('ही नोंद कायमची हटवायची आहे का?')) await deleteDoc(doc(db, "users", user.uid, "jobs", id)); };

        // VOICE INPUT
        const vBtn = document.getElementById('voice-btn');
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech(); rec.lang = 'mr-IN';
            vBtn.onclick = () => { rec.start(); vBtn.classList.add('recording'); };
            rec.onresult = (e) => { document.getElementById('j-cust').value = e.results[0][0].transcript; vBtn.classList.remove('recording'); };
            rec.onend = () => vBtn.classList.remove('recording');
        }

        // BILLING & MODAL
        window.openBill = (n, a, p, v, u, ph) => {
            const modal = document.getElementById('bill-modal');
            const qBox = document.getElementById('qr-code');
            
            document.getElementById('bill-biz').innerText = bizSettings.bizName || 'TractorWala';
            document.getElementById('b-name').innerText = n;
            document.getElementById('b-work').innerText = `${v} ${u}`;
            document.getElementById('b-amt').innerText = `₹${a}`;

            qBox.innerHTML = "";
            if(bizSettings.upi) { 
                new QRCode(qBox, { 
                    text: `upi://pay?pa=${bizSettings.upi}&pn=${bizSettings.bizName}&am=${a}&cu=INR`, 
                    width: 140, 
                    height: 140,
                    colorDark: "#1e293b",
                    colorLight: "#f8fafc"
                }); 
            } else {
                qBox.innerHTML = `<div class="text-slate-400 text-[10px] uppercase font-bold text-center w-32 h-32 flex items-center justify-center border-2 border-dashed border-slate-200 rounded-2xl">UPI सेट करा</div>`;
            }
            
            document.getElementById('wa-btn').onclick = () => {
                const msg = `🚜 *${bizSettings.bizName}*\n\nशेतकरी: ${n}\nकाम: ${v} ${u}\nरक्कम: ₹${a}\nस्थिती: ${p === 'true' ? '✅ Paid' : '⏳ Pending'}\n\nधन्यवाद!`;
                window.open(`https://wa.me/${ph ? '91'+ph : ''}?text=${encodeURIComponent(msg)}`);
            };

            document.getElementById('pdf-btn').onclick = () => {
                const { jsPDF } = window.jspdf; 
                const doc = new jsPDF();
                doc.setFontSize(22); doc.text(bizSettings.bizName || "TractorWala", 20, 20);
                doc.setFontSize(12); doc.text("Invoice / Bill", 20, 30);
                doc.line(20, 35, 190, 35);
                doc.text(`Farmer Name: ${n}`, 20, 50);
                doc.text(`Work Details: ${v} ${u}`, 20, 60);
                doc.text(`Total Amount: Rs. ${a}`, 20, 70);
                doc.text(`Status: ${p === 'true' ? 'Paid' : 'Unpaid'}`, 20, 80);
                doc.save(`${n}_bill.pdf`);
            };
            modal.classList.remove('hidden');
        };

        window.closeBill = () => document.getElementById('bill-modal').classList.add('hidden');
    </script>
</body>
</html>
